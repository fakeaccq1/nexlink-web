<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexLink - مساحتك السحابية</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: white; text-align: center; padding: 50px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input { margin: 20px 0; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>أهلاً بك في NexLink 🚀</h1>
        <p>ارفع ملفاتك على مساحتك الخاصة المؤمنة</p>
        <input type="file" id="fileInput">
        <br>
        <button onclick="alert('تم استلام الملف.. جاري الربط بالمخزن!')">رفع الملف</button>
    </div>
</body>
</html>
