<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexLink Vault | Secure Cloud Storage</title>
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1200.0.min.js"></script>
    <style>
        :root { --primary: #00d1b2; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); width: 90%; max-width: 450px; text-align: center; border: 1px solid #334155; }
        h1 { color: var(--primary); margin-bottom: 10px; font-size: 28px; }
        p { color: #94a3b8; margin-bottom: 30px; }
        .upload-box { border: 2px dashed #475569; padding: 40px; border-radius: 20px; margin-bottom: 25px; cursor: pointer; transition: 0.3s; background: #0f172a; }
        .upload-box:hover { border-color: var(--primary); background: #1e293b; }
        #file-name { font-weight: bold; color: var(--primary); margin-top: 10px; display: block; }
        button { background: var(--primary); color: #0f172a; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-size: 18px; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        button:disabled { background: #475569; cursor: not-allowed; }
        #status { margin-top: 20px; font-size: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>NexLink Vault 🔐</h1>
    <p>Securely upload files to your NFC storage</p>
    
    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#00d1b2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        <span id="file-name">Click to choose a file</span>
        <input type="file" id="fileInput" hidden>
    </div>

    <button onclick="uploadToB2()" id="uploadBtn">Upload to Cloud</button>
    <div id="status"></div>
</div>

<script>
    // --- YOUR PRIVATE KEYS FROM THE IMAGE ---
    const B2_CONFIG = {
        accessKeyId: '32e9b3a7ca93', // From your image
        secretAccessKey: '00564eeee8999ee5dedc3c3fd30472b999a087582f', // From your image
        endpoint: 'https://s3.us-east-005.backblazeb2.com', // From your image
        bucketName: 'nexlink-vault-', // From your image
        region: 'us-east-005'
    };

    // Initialize S3 Client for Backblaze
    const s3 = new AWS.S3({
        accessKeyId: B2_CONFIG.accessKeyId,
        secretAccessKey: B2_CONFIG.secretAccessKey,
        endpoint: B2_CONFIG.endpoint,
        s3ForcePathStyle: true, // Required for B2
        signatureVersion: 'v4'
    });

    document.getElementById('fileInput').onchange = function() {
        const file = this.files[0];
        if (file) {
            document.getElementById('file-name').innerText = file.name;
        }
    };

    function uploadToB2() {
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const btn = document.getElementById('uploadBtn');
        const file = fileInput.files[0];

        if (!file) {
            alert("Please select a file first!");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Uploading... Please wait";
        status.innerText = "Connecting to NexLink Servers...";

        const params = {
            Bucket: B2_CONFIG.bucketName,
            Key: 'uploads/' + Date.now() + '-' + file.name, // Saves in an "uploads" folder
            Body: file,
            ContentType: file.type
        };

        s3.upload(params, function(err, data) {
            if (err) {
                console.log(err);
                status.innerHTML = "❌ Error: " + err.message;
                status.style.color = "#ff4d4d";
                btn.disabled = false;
                btn.innerText = "Try Again";
            } else {
                status.innerHTML = "✅ Success! File saved in your Vault.";
                status.style.color = "#00d1b2";
                btn.disabled = false;
                btn.innerText = "Upload Another File";
                document.getElementById('file-name').innerText = "Click to choose a file";
                fileInput.value = ""; // Reset input
            }
        });
    }
</script>

</body>
</html>
